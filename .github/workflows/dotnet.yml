# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: toolnexus
          POSTGRES_USER: toolnexus
          POSTGRES_PASSWORD: toolnexus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U toolnexus -d toolnexus"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      env:
        TOOLNEXUS_DB_CONNECTION: Host=localhost;Port=5432;Database=toolnexus;Username=toolnexus;Password=toolnexus
      run: dotnet test --no-build --verbosity normal
