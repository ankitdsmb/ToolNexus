name: Integrity Enforcement

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dependency integrity gate
        run: npm run integrity:deps

      - name: Static integrity gates
        run: npm run integrity:ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start ToolNexus web server
        run: |
          node scripts/playwright-webserver.mjs &
          echo $! > .playwright-webserver.pid

      - name: Runtime coverage gate
        env:
          INTEGRITY_WITH_RUNTIME: '1'
        run: npm run integrity:runtime

      - name: Upload integrity reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integrity-reports
          path: reports/integrity/*.json

      - name: Upload JS governance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: js-governance
          path: |
            artifacts/js-governance-baseline.json
            artifacts/dynamic-import-governance-report.json
            reports/integrity/static-graph.json

      - name: Upload dependency audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: artifacts/dependency-report.json

      - name: Stop ToolNexus web server
        if: always()
        run: |
          if [ -f .playwright-webserver.pid ]; then
            kill $(cat .playwright-webserver.pid) || true
          fi
